services:
  # --- Database ---
  db:
    image: mysql:8.0
    container_name: aidoc_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Anuradha@123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aidocplatform}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Anuradha@123}"]
      timeout: 20s
      retries: 10

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aidoc_backend
    restart: unless-stopped
    environment:
      - DATABASE_HOST=db
      - APP_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - AZURE_BLOB_CONTAINER_NAME=${AZURE_BLOB_CONTAINER_NAME}
      - AZURE_DI_ENDPOINT=${AZURE_DI_ENDPOINT}
      - AZURE_DI_KEY=${AZURE_DI_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    # ports:
    #   - "8000:8000" # Internal only, accessible via Nginx at /api

  # --- Frontend (React + Nginx Proxy) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aidoc_frontend
    restart: unless-stopped
    depends_on:
      - backend
    # ports:
    #   - "80:80" # Exposed via dedicated Nginx container below

  # --- Nginx Proxy (Single Entry Point) ---
  nginx:
    image: nginx:alpine
    container_name: aidoc_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
