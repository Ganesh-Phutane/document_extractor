server {
    listen 80;
    server_name localhost;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Handle Single Page Application routing (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for backend API calls
    # This maps 'http://localhost/api/v1/...' to 'http://backend:8000/v1/...'
    # Or 'http://localhost/api/documents' to 'http://backend:8000/documents' (as per your backend routes)
    location /api/ {
        # 'backend' is the service name defined in docker-compose.yml
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for long-running AI extractions
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Optional: Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
