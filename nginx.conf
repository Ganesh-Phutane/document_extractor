server {
    listen 80;
    server_name localhost;

    # Maximum client body size for document uploads (100MB)
    client_max_body_size 100M;

    # ── Frontend Static Serving ──────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API Reverse Proxy ────────────────────────────────
    location /api/ {
        # Note the trailing slash in proxy_pass:
        # http://localhost/api/health -> http://127.0.0.1:8000/health
        proxy_pass http://127.0.0.1:8000/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;

        # Ensure redirects include the /api prefix
        proxy_redirect / /api/;
        proxy_redirect http://$host/ /api/;
        proxy_redirect https://$host/ /api/;

        # Increase timeouts for long-running AI extractions
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;

        # Websocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Optional: Custom error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
